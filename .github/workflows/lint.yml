name: Lint & Dependencies

on:
  push:
    branches: [ main, v0.5, v2_test ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

      - name: Check Dependencies
        run: go mod verify && go mod tidy && git diff --exit-code
